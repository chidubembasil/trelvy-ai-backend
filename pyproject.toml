[project]
name = "trelvy"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.138.1",
    "fastapi-mail>=1.6.5",
    "openai-codex>=0.1.0b2",
    "passlib[bcrypt]>=1.7.4",
    "prisma>=0.15.0",
    "python-dotenv>=1.2.2",
    "python-jose>=3.5.0",
]

# ── Tell uv to only install codex CLI binary on supported platforms ──
[tool.uv]
environments = [
    "sys_platform == 'win32'",
    "sys_platform == 'darwin'",
    "sys_platform == 'linux' and platform_machine == 'x86_64'",
]